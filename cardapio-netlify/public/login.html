<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sabor & Arte Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet" />
  <style>
    :root {
      --cream: #FBF8F2;
      --espresso: #2C1A0E;
      --gold: #C8973A;
      --gold-light: #E8B865;
      --warm-gray: #8B7355;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: var(--espresso);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: absolute; inset: 0;
      background: 
        radial-gradient(ellipse 80% 60% at 20% 80%, rgba(200, 151, 58, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 20%, rgba(200, 151, 58, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }
    .pattern {
      position: absolute; inset: 0;
      background-image: radial-gradient(rgba(200,151,58,0.06) 1px, transparent 1px);
      background-size: 30px 30px;
    }
    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 20px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      background: rgba(251, 248, 242, 0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(200, 151, 58, 0.2);
      border-radius: 20px;
      padding: 48px 40px;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .login-logo .icon-wrap {
      width: 72px; height: 72px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 16px;
      box-shadow: 0 8px 32px rgba(200, 151, 58, 0.3);
    }
    .login-logo .icon-wrap .material-icons-round {
      font-size: 36px; color: white;
    }
    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      font-size: 26px; font-weight: 700;
      color: var(--cream);
      margin-bottom: 4px;
    }
    .login-logo p {
      color: var(--warm-gray);
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .form-label {
      color: rgba(251,248,242,0.7);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
      margin-bottom: 20px;
    }
    .input-wrap .material-icons-round {
      position: absolute;
      left: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--warm-gray);
      font-size: 20px;
      pointer-events: none;
    }
    .form-control {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(200,151,58,0.2);
      border-radius: 12px;
      color: var(--cream);
      padding: 14px 14px 14px 46px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      transition: all 0.2s;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.07);
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(200,151,58,0.15);
      color: var(--cream);
      outline: none;
    }
    .form-control::placeholder { color: rgba(251,248,242,0.3); }
    .btn-entrar {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold), var(--gold-light));
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(200,151,58,0.3);
      margin-top: 8px;
    }
    .btn-entrar:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(200,151,58,0.4);
    }
    .btn-entrar:active { transform: translateY(0); }
    .btn-entrar:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .erro-msg {
      background: rgba(220,53,69,0.15);
      border: 1px solid rgba(220,53,69,0.3);
      border-radius: 10px;
      color: #ff6b6b;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 24px;
      color: var(--warm-gray);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--gold); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="pattern"></div>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <div class="icon-wrap">
        <span class="material-icons-round">restaurant</span>
      </div>
      <h1>Sabor & Arte</h1>
      <p>Painel Administrativo</p>
    </div>

    <div class="erro-msg" id="erroMsg">
      <span class="material-icons-round" style="font-size:18px">error</span>
      <span id="erroTexto"></span>
    </div>

    <div>
      <label class="form-label">Email</label>
      <div class="input-wrap">
        <span class="material-icons-round">email</span>
        <input type="email" class="form-control" id="email" placeholder="admin@restaurante.com" />
      </div>

      <label class="form-label">Senha</label>
      <div class="input-wrap">
        <span class="material-icons-round">lock</span>
        <input type="password" class="form-control" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter')fazerLogin()" />
      </div>

      <button class="btn-entrar" id="btnEntrar" onclick="fazerLogin()">
        <span class="material-icons-round" id="loginIcon">login</span>
        <span id="loginText">Entrar</span>
      </button>
    </div>

    <a href="/" class="back-link">
      <span class="material-icons-round" style="font-size:16px">arrow_back</span>
      Voltar ao Cardápio
    </a>
  </div>
</div>

<script>
async function fazerLogin() {
  const email = document.getElementById('email').value.trim();
  const senha = document.getElementById('senha').value;
  const erroMsg = document.getElementById('erroMsg');
  const btn = document.getElementById('btnEntrar');

  if (!email || !senha) {
    mostrarErro('Preencha o email e a senha.');
    return;
  }

  btn.disabled = true;
  document.getElementById('loginIcon').classList.add('spin');
  document.getElementById('loginText').textContent = 'Entrando...';
  erroMsg.style.display = 'none';

  try {
    const res = await fetch('/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const data = await res.json();

    if (data.sucesso) {
      if (data.token) localStorage.setItem("admin_token", data.token);
      document.getElementById('loginIcon').textContent = 'check_circle';
      document.getElementById('loginText').textContent = 'Redirecionando...';
      setTimeout(() => window.location.href = data.redirect, 500);
    } else {
      mostrarErro(data.erro || 'Erro ao fazer login.');
      btn.disabled = false;
      document.getElementById('loginIcon').classList.remove('spin');
      document.getElementById('loginIcon').textContent = 'login';
      document.getElementById('loginText').textContent = 'Entrar';
    }
  } catch(e) {
    mostrarErro('Erro de conexão. Tente novamente.');
    btn.disabled = false;
    document.getElementById('loginIcon').classList.remove('spin');
    document.getElementById('loginIcon').textContent = 'login';
    document.getElementById('loginText').textContent = 'Entrar';
  }
}

function mostrarErro(msg) {
  const el = document.getElementById('erroMsg');
  document.getElementById('erroTexto').textContent = msg;
  el.style.display = 'flex';
}
</script>
</body>
</html>
